[build]
  base = "Frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# React Router uses client-side routing. Without this, refreshing or
# directly visiting any route other than "/" (e.g. /products/1) returns
# a 404 from Netlify's static file server instead of loading the app.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
